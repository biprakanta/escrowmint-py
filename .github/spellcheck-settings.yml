matrix:
  - name: Markdown
    expect_match: false
    apsell:
      lang: en
      d: en_US
      ignore-case: true
    dictionary:
      wordlists:
        - .github/wordlist.txt
      output: wordlist.dic
    pipeline:
      - pyspelling.filters.markdown:
          markdown_extensions:
            - markdown.extensions.extra:
      - pyspelling.filters.html:
          comments: false
          attributes:
            - alt
          ignores:
            - ":matches(code, pre)"
            - code
            - pre
            - blockquote
            - img
    sources:
      # Keep generated changelogs out of spellcheck. Release Please injects short
      # commit hashes and issue/PR references that Aspell tokenizes into random
      # pseudo-words, which makes release PRs fail nondeterministically.
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/*.md"
