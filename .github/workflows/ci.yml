name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: escrowmint-py-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest | tee pytest-output.txt

      - name: Generate coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          text = pathlib.Path("pytest-output.txt").read_text()
          match = re.search(r"Total coverage: ([0-9]+\.[0-9]+)%", text)
          if match is None:
              raise SystemExit("Could not find coverage in pytest output")

          value = float(match.group(1))
          if value >= 90:
              color = "brightgreen"
          elif value >= 80:
              color = "green"
          elif value >= 70:
              color = "yellow"
          elif value >= 60:
              color = "orange"
          else:
              color = "red"

          out_dir = pathlib.Path("badge-data")
          out_dir.mkdir(exist_ok=True)
          payload = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{value:.2f}%",
              "color": color,
          }
          (out_dir / "coverage.json").write_text(json.dumps(payload))
          PY

      - name: Publish coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: badges
          publish_dir: ./badge-data

      - name: Build distributions
        run: uv build
