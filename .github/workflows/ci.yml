name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: escrowmint-py-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Check README install instructions
        run: |
          ! grep -nE "Until the first PyPI release|git\\+https://github.com/biprakanta/escrowmint-py" README.md
          grep -nF "uv add escrowmint" README.md
          grep -nF "pip install escrowmint" README.md

      - name: Run lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest | tee pytest-output.txt

      - name: Extract coverage
        id: coverage
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          text = pathlib.Path("pytest-output.txt").read_text()
          match = re.search(r"Total coverage: ([0-9]+(?:\.[0-9]+)?)%", text)
          if match is None:
              raise SystemExit("Could not find coverage in pytest output")

          value = float(match.group(1))
          with pathlib.Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"value={value:.2f}\n")
          PY

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  test-python38:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run lint
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest

  test-built-package:
    needs:
      - lint-test-build
      - test-python38
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Install built wheel smoke test
        run: |
          python -m venv .pkg-smoke
          . .pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from escrowmint import Client
          print(Client.__name__)
          PY

  publish-coverage-badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-test-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate coverage badge data
        env:
          COVERAGE: ${{ needs.lint-test-build.outputs.coverage }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          value = float(os.environ["COVERAGE"])
          if value >= 90:
              color = "brightgreen"
          elif value >= 80:
              color = "green"
          elif value >= 70:
              color = "yellow"
          elif value >= 60:
              color = "orange"
          else:
              color = "red"

          out_dir = pathlib.Path("badge-data")
          out_dir.mkdir(exist_ok=True)
          payload = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{value:.2f}%",
              "color": color,
          }
          (out_dir / "coverage.json").write_text(json.dumps(payload))
          PY

      - name: Publish coverage badge data
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_branch: badges
          publish_dir: ./badge-data
